<!--quiz.html-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS CPC Quiz Trainer | Integrity Programming</title>
    <link rel="stylesheet" href="../css/swag.css" />
</head>

<body>
    <main class="container">

        <button onclick="window.location.href='index.html'" class="secondary-btn mb-3">🏠 Back to CPC Menu</button>

        <section id="start-screen" class="card active">
            <h1 class="fw-bold">AWS Certified Cloud Practitioner Quiz</h1>
            <p class="lead">Select a domain and question count to begin.</p>

            <div id="domain-filter" class="domain-filter">
    <p class="filter-title"><strong>Filter by Domain:</strong></p>
    <div id="dynamic-domain-options" class="filter-options">
        <p class="text-sm italic">Connecting to Shanda's Brain (AWS)...</p>
    </div>
    
    <div class="mt-3">
        <button id="clear-filters-btn" class="warning-btn"> Clear Filters</button>
    </div>
</div>
        
        <section><div class="form-group mt-4">
                <h3>Number of Questions</h3>
                <div class="radio-group">
                    <label><input type="radio" name="count" value="5" checked /> 5</label>
                    <label><input type="radio" name="count" value="10" /> 10</label>
                    <label><input type="radio" name="count" value="25" /> 25</label>
                </div>
            </div>


        </section>
            
            <div class="btn-group d-flex justify-content-center gap-3 mt-4">
                <button id="start-btn" class="d-flex justify-content-center gap-3 mt-4" disabled>Start Quiz</button>
                <button id="dashboard-btn" class="d-flex justify-content-center gap-3 mt-4">View Progress</button>
            </div>
            
        </section>
        

        <section id="quiz-screen" class="card hidden">
            <div id="quiz-status" class="quiz-status-bar">
                <span id="question-number">Question 1</span>
                <span id="timer">Time: 00:00</span>
            </div>

            <h2 id="question-text" class="mt-3"></h2>
            <ul id="options" class="option-list"></ul>

            <div class="btn-group mt-3">
                <button id="next-btn" class="blue-btn" disabled>Next</button>
            </div>
        </section>

        <section id="result-screen" class="card hidden">
            <h2>Results</h2>
            <div id="score-summary" class="score-display"></div>
            
            <div class="btn-group mt-4">
                <button id="review-btn" class="green-btn">🧠 View Review</button>
                <button id="restart-btn" class="secondary-btn">Restart</button>
            </div>
        </section>

        <section id="review-screen" class="card hidden">
            <h2>Question Review</h2>
            <div id="review-container"></div>
            <button id="back-to-results-btn" class="back-btn">⬅️ Back to Results</button>
        </section>

        <section id="progress-screen" class="card hidden">
            <h2>📊 Progress Dashboard</h2>
            <div id="progress-summary" class="progress-summary">
                <p>Total Quizzes Taken: <span id="total-quizzes">0</span></p>
                <p>Average Score: <span id="avg-score">0%</span></p>
            </div>
            <div id="history-list" class="history-container mt-3">
                </div>
            <div class="btn-group mt-4">
                <button id="close-progress" class="secondary-btn">Close</button>
            </div>
        </section>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
